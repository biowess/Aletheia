name: Build Windows Executable

on:
  workflow_dispatch:  # Allows manual triggering from the GitHub Actions tab
  release:
    types: [created]  # Optionally triggers when you create a new GitHub release

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Build Python Backend
        run: |
          cd backend
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          pyinstaller backend.spec --clean
          Write-Host "--- backend/dist contents ---"
          Get-ChildItem -Recurse dist | Select-Object FullName
        shell: pwsh

      - name: Build React Frontend
        run: |
          cd frontend
          npm install
          npm run build
          Write-Host "--- frontend/dist contents ---"
          Get-ChildItem -Recurse dist | Select-Object FullName
        shell: pwsh

      - name: Build Electron App
        run: |
          cd electron
          npm install
          npx electron-builder --win
          Write-Host "--- dist contents ---"
          Get-ChildItem -Recurse ../dist | Select-Object FullName
        shell: pwsh

      - name: Check Output Directory
        if: always()
        run: |
          Write-Host "--- repo root dist ---"
          if (Test-Path dist) { Get-ChildItem -Recurse dist | Select-Object FullName } else { Write-Host "dist/ does not exist" }
        shell: pwsh

      - name: Upload Windows Executable Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Aletheia-Windows-Setup
          path: |
            dist/
            electron/dist/
            **/*.exe
          retention-days: 7

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Aletheia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 860px;
      height: 480px;
      background: #ffffff;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      display: flex;
      flex-direction: column;
    }

    .main {
      display: flex;
      flex: 1;
      padding: 52px 48px 32px 52px;
      gap: 40px;
    }

    .left {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .top-content {
      display: flex;
      flex-direction: column;
      gap: 28px;
    }

    .logo-mark {
      width: 90px;
      height: auto;
    }

    .title-block {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0;
      color: #0f2041;
      text-transform: uppercase;
    }

    .version {
      font-size: 13px;
      color: #4a5568;
      font-weight: 400;
    }

    .status {
      font-size: 13px;
      color: #4a5568;
      font-weight: 400;
      min-height: 18px;
    }

    .copyright {
      font-size: 12px;
      color: #94a3b8;
    }

    .right {
      width: 255px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }

    .hospital-wrap {
      width: 100%;
      aspect-ratio: 3 / 4;
      border-radius: 2px;
      overflow: hidden;
      position: relative;
    }

    .hospital-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hospital-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: #2c5282;
      opacity: 0.3;
      mix-blend-mode: color;
      pointer-events: none;
    }

    .bar-section {
      height: 6px;
      width: 100%;
      background: #e8edf5;
      position: relative;
      flex-shrink: 0;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #2c5282, #63b3ed);
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }

    .bar-fill::after {
      content: '';
      position: absolute;
      right: 0;
      top: 0;
      height: 100%;
      width: 40px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4));
    }
  </style>
</head>
<body>

  <div class="main">
    <div class="left">
      <div class="top-content">
        <img class="logo-mark" src="assets/logo_mark.png" alt="Aletheia" draggable="false" />
        <div class="title-block">
          <h1>Aletheia Clinical Workstation</h1>
          <div class="version">Version 0.1.0</div>
          <div class="status" id="status">Initializing...</div>
        </div>
      </div>
      <div class="copyright">© 2026 Biowess. All rights reserved.</div>
    </div>

    <div class="right">
      <div class="hospital-wrap">
        <img src="assets/hospital.png" alt="" draggable="false" />
      </div>
    </div>
  </div>

  <div class="bar-section">
    <div class="bar-fill" id="bar"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const barEl    = document.getElementById('bar');

    if (window.splashBridge) {
      window.splashBridge.onProgress((data) => {
        statusEl.textContent = data.message;
        barEl.style.width    = data.percent + '%';
      });
    }
  </script>
</body>
</html>
